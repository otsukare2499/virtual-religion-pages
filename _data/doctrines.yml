- id: 0
  text: "後悔を減らすために"
  tenets:
    - id: 0
      text : "欲求が満足でも不満でもない、ニュートラルな状態で意思決定すること。"
    - id: 1
      text : "標準から逸れる時は、理由を明確にすること。"
- id: 1
  text: "怒りを減らすために"
  tenets:
    - id: 0
      text : "他者の未熟には、親の視点から対応すること。"
- id: 2
  text: "納得感を高めるために"
  tenets:
    - id: 0
      text : "所属集団の道徳を理解し、自分の道徳に従って行動すること。"
    - id: 1
      text : "行き過ぎた健康よりも、適度な健全を目指すこと。"
- id: 3
  text: "不満を減らすために"
  tenets:
    - id: 0
      text : "時季に合わせて、役割を全うすること。"
- id: 4
  text: "不安を減らすために"
  tenets:
    - id: 0
      text : "失敗を恐れる時は、後始末の手順を確認すること。"
- id: 5
  text: "摩擦を減らすために"
  tenets:
    - id: 0
      text : "他者への応答を安定させること。"
    - id: 1
      text : "皮肉は使わぬこと。"
    - id: 2
      text : "他者に強制せぬこと。"
    - id: 3
      text : "義務を果たすときは、自分の都合ではなく、所属集団の都合を優先すること。"
